<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#080810" />
  <title>Habitual</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Space Grotesk', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
        },
      },
    };
  </script>
  <style>
    :root {
      /* Surface ramp — violet-tinted, four tonal tiers */
      --bg:          #080810;
      --surface:     #0f0f1c;
      --surface-2:   #16162a;
      --surface-3:   #1e1e35;
      --border:      #2a2a45;

      /* Text — violet undertone matching the surface family */
      --text:        oklch(0.94 0.008 275deg);
      --text-muted:  oklch(0.53 0.018 276deg);
      --text-dim:    oklch(0.40 0.014 276deg);

      /* Category colors — built in OKLCH, no Tailwind defaults */
      --football: oklch(0.57 0.24 258deg);   /* deep cobalt indigo */
      --strength: oklch(0.58 0.27 297deg);   /* electric violet */
      --speed:    oklch(0.67 0.20 38deg);    /* amber-coral */
      --cardio:   oklch(0.63 0.17 150deg);   /* deep emerald */
      --chinese:  oklch(0.70 0.14 207deg);   /* arctic precision */

      /* Status signals */
      --done:      oklch(0.63 0.17 150deg);  /* = cardio */
      --injured:   oklch(0.73 0.16 62deg);   /* deep amber */
      --cancelled: oklch(0.57 0.21 22deg);   /* deep crimson */
      --skipped:   oklch(0.53 0.018 276deg); /* = text-muted */

      --safe-top:    env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);

      --gradient:     linear-gradient(90deg,  var(--football), var(--strength));
      --gradient-cta: linear-gradient(135deg, var(--football), var(--strength));
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      overscroll-behavior: none;
    }

    body {
      display: flex;
      flex-direction: column;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── Scrollable main ── */
    #main-content {
      flex: 1;
      overflow-y: auto;
      padding-bottom: calc(72px + var(--safe-bottom));
      padding-top: calc(var(--safe-top) + 130px);
    }

    /* ── Sticky header ── */
    #app-header {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      z-index: 50;
      padding-top: var(--safe-top);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    /* ── Bottom tab bar ── */
    #tab-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      z-index: 50;
      padding-bottom: var(--safe-bottom);
      background: var(--surface);
      border-top: 1px solid var(--border);
    }

    /* ── Progress bar ── */
    .progress-track {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 2px;
      background: var(--gradient);
      transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    }

    /* ── Day group ── */
    .day-group { margin-bottom: 24px; }
    .day-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      margin-bottom: 10px;
    }
    .day-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    .day-label.today { color: var(--text); }
    .today-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 20px;
      background: color-mix(in oklch, var(--football) 12%, transparent);
      color: var(--football);
      letter-spacing: 0.05em;
    }
    .day-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
      margin-left: auto;
    }

    /* ── Session card ── */
    .card {
      margin: 0 12px 8px;
      background: var(--surface);
      border-radius: 14px;
      border: 1px solid var(--type-color, var(--border));
      overflow: hidden;
      transition: opacity 0.2s cubic-bezier(0.22, 1, 0.36, 1),
                  border-color 0.2s cubic-bezier(0.22, 1, 0.36, 1),
                  background 0.15s cubic-bezier(0.22, 1, 0.36, 1);
      cursor: pointer;
    }
    .card:hover  { background: var(--surface-2); }
    .card:active { opacity: 0.75; }

    .card.status-done      { opacity: 0.55; }
    .card.status-injured   { border-color: var(--injured) !important; }
    .card.status-cancelled { opacity: 0.45; border-color: var(--cancelled) !important; }
    .card.status-skipped   { opacity: 0.45; }

    .card[data-type="football"] { --type-color: var(--football); }
    .card[data-type="strength"] { --type-color: var(--strength); }
    .card[data-type="speed"]    { --type-color: var(--speed); }
    .card[data-type="cardio"]   { --type-color: var(--cardio); }
    .card[data-type="chinese"]  { --type-color: var(--chinese); }

    .card-header {
      display: flex;
      align-items: center;
      padding: 13px 14px;
      gap: 12px;
    }
    .card-type-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--type-color, var(--border));
    }
    .card-info { flex: 1; min-width: 0; }
    .card-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .card-status-btn {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .card-status-btn:hover { border-color: var(--text-muted); }
    .card-status-btn:focus-visible { outline: 2px solid var(--football); outline-offset: 2px; }
    .card-status-btn.done     { border-color: var(--done);      background: color-mix(in oklch, var(--done)      9%, transparent); }
    .card-status-btn.injured  { border-color: var(--injured);   background: color-mix(in oklch, var(--injured)   9%, transparent); }
    .card-status-btn.cancelled{ border-color: var(--cancelled); background: color-mix(in oklch, var(--cancelled) 9%, transparent); }
    .card-status-btn.skipped  { border-color: var(--skipped);   background: color-mix(in oklch, var(--skipped)   9%, transparent); }

    /* chevron */
    .card-chevron {
      font-size: 12px;
      color: var(--text-dim);
      transition: transform 0.25s cubic-bezier(0.22, 1, 0.36, 1);
      margin-left: 2px;
      flex-shrink: 0;
    }
    .card.expanded .card-chevron { transform: rotate(180deg); }

    /* ── Expandable section (grid trick) ── */
    .card-expand-wrap {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.28s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .card.expanded .card-expand-wrap { grid-template-rows: 1fr; }
    .card-expand-inner {
      overflow: hidden;
    }
    .card-expand-body {
      padding: 0 14px 14px;
      border-top: 1px solid var(--border);
      margin-top: 0;
    }

    /* status buttons inside expand */
    .status-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .status-pill {
      flex: 1;
      min-width: 0;
      padding: 8px 6px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: transparent;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s cubic-bezier(0.22, 1, 0.36, 1);
      text-align: center;
      white-space: nowrap;
    }
    .status-pill:hover  { border-color: var(--text-muted); color: var(--text); }
    .status-pill:active { opacity: 0.7; }
    .status-pill:focus-visible { outline: 2px solid var(--football); outline-offset: 2px; }
    .status-pill.active-done      { border-color: var(--done);      color: var(--done);      background: color-mix(in oklch, var(--done)      8%, transparent); }
    .status-pill.active-injured   { border-color: var(--injured);   color: var(--injured);   background: color-mix(in oklch, var(--injured)   8%, transparent); }
    .status-pill.active-cancelled { border-color: var(--cancelled); color: var(--cancelled); background: color-mix(in oklch, var(--cancelled) 8%, transparent); }
    .status-pill.active-skipped   { border-color: var(--skipped);   color: var(--skipped);   background: color-mix(in oklch, var(--skipped)   8%, transparent); }

    /* felt buttons */
    .felt-section { margin-top: 12px; }
    .felt-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .felt-row {
      display: flex;
      gap: 6px;
    }
    .felt-btn {
      flex: 1;
      padding: 7px 4px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: transparent;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s cubic-bezier(0.22, 1, 0.36, 1);
      text-align: center;
    }
    .felt-btn:hover  { border-color: var(--strength); color: var(--strength); }
    .felt-btn:active { opacity: 0.7; }
    .felt-btn:focus-visible { outline: 2px solid var(--strength); outline-offset: 2px; }
    .felt-btn.active { border-color: var(--strength); color: var(--strength); background: color-mix(in oklch, var(--strength) 8%, transparent); }

    /* notes */
    .notes-section { margin-top: 12px; }
    .notes-textarea {
      width: 100%;
      background: var(--surface-3);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      padding: 10px 12px;
      resize: none;
      outline: none;
      min-height: 64px;
    }
    .notes-textarea::placeholder { color: var(--text-dim); }
    .notes-textarea:focus { border-color: color-mix(in oklch, var(--football) 30%, transparent); }

    /* ── History view ── */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 16px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
    }
    .stat-value {
      font-size: 28px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text);
      line-height: 1;
    }
    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .week-row {
      margin: 0 12px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
    }
    .week-row-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .week-dates {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-muted);
    }
    .week-pct {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
    }
    .week-mini-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .week-mini-fill {
      height: 100%;
      border-radius: 2px;
      background: var(--gradient);
    }
    .week-pills {
      display: flex;
      gap: 8px;
    }
    .week-pill {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 20px;
    }
    .week-pill.done-pill      { background: color-mix(in oklch, var(--done)      9%, transparent); color: var(--done); }
    .week-pill.injured-pill   { background: color-mix(in oklch, var(--injured)   9%, transparent); color: var(--injured); }
    .week-pill.cancelled-pill { background: color-mix(in oklch, var(--cancelled) 9%, transparent); color: var(--cancelled); }
    .week-pill.skipped-pill   { background: color-mix(in oklch, var(--skipped)   9%, transparent); color: var(--skipped); }

    /* ── Office day modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(8, 8, 16, 0.85);
      backdrop-filter: blur(6px);
      z-index: 100;
      display: flex;
      align-items: flex-end;
      padding-bottom: var(--safe-bottom);
    }
    .modal-overlay.hidden { display: none; }
    .modal-sheet {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      background: var(--surface-2);
      border-top-left-radius: 24px;
      border-top-right-radius: 24px;
      padding: 24px 20px 32px;
      border-top: 1px solid var(--border);
    }
    .modal-handle {
      width: 36px;
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      margin: 0 auto 20px;
    }
    .modal-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .modal-subtitle {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }
    .day-toggles {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .day-toggle {
      flex: 1;
      padding: 12px 4px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: var(--surface-3);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      text-align: center;
      transition: all 0.15s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .day-toggle:hover { border-color: var(--text-muted); color: var(--text); }
    .day-toggle:focus-visible { outline: 2px solid var(--football); outline-offset: 2px; }
    .day-toggle.selected {
      border-color: var(--football);
      background: color-mix(in oklch, var(--football) 9%, transparent);
      color: var(--football);
    }
    .modal-note {
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 20px;
      padding: 10px 12px;
      background: var(--surface-3);
      border-radius: 10px;
      border: 1px solid var(--border);
    }
    .modal-btn {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: none;
      background: var(--gradient-cta);
      color: #ffffff;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .modal-btn:hover  { opacity: 0.92; }
    .modal-btn:active { opacity: 0.85; }
    .modal-btn:focus-visible { outline: 2px solid var(--football); outline-offset: 2px; }
    .modal-btn-row {
      display: flex;
      gap: 10px;
      margin-top: 0;
    }
    .modal-btn-secondary {
      flex: 0 0 auto;
      padding: 16px 20px;
      border-radius: 14px;
      border: 1.5px solid var(--border);
      background: var(--surface-3);
      color: var(--text-muted);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.15s cubic-bezier(0.22, 1, 0.36, 1),
                  color 0.15s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .modal-btn-secondary:hover { border-color: var(--text-muted); color: var(--text); }
    .modal-btn-secondary:focus-visible { outline: 2px solid var(--football); outline-offset: 2px; }

    /* ── Diff list ── */
    .diff-list {
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .diff-item {
      padding: 11px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .diff-item:last-child { border-bottom: none; }
    .diff-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 4px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .diff-badge-update { background: color-mix(in oklch, var(--football)  9%, transparent); color: var(--football); }
    .diff-badge-add    { background: color-mix(in oklch, var(--cardio)    9%, transparent); color: var(--cardio); }
    .diff-badge-remove { background: color-mix(in oklch, var(--cancelled) 9%, transparent); color: var(--cancelled); }
    .diff-detail { flex: 1; min-width: 0; }
    .diff-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 3px;
    }
    .diff-day {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 4px;
    }
    .diff-slots {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .diff-old { text-decoration: line-through; color: var(--text-dim); }
    .diff-arrow { color: var(--football); }
    .diff-new { color: var(--text); }
    .diff-slot-only { color: var(--text-muted); }

    /* ── Editable time slot in card ── */
    .card-time-input {
      background: none;
      border: none;
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      padding: 0;
      margin: 0;
      width: 100%;
      outline: none;
      cursor: text;
      caret-color: var(--football);
      min-width: 0;
    }
    .card-time-input:focus { color: var(--text-muted); }
    .card-time-input::placeholder { color: var(--text-dim); opacity: 0.4; }

    /* ── Tab bar ── */
    .tab-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 0;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-dim);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      font-weight: 600;
      gap: 4px;
      transition: color 0.15s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .tab-btn:hover { color: var(--text-muted); }
    .tab-btn:focus-visible { outline: 2px solid var(--football); outline-offset: 2px; }
    .tab-btn.active { color: var(--football); }
    .tab-icon { font-size: 20px; line-height: 1; }

    /* ── Loading ── */
    #loading-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    #loading-screen.hidden { display: none; }
    .loader-wordmark {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      letter-spacing: 0.25em;
      color: var(--text-muted);
      margin-top: 16px;
    }
    .loader-dot-row {
      display: flex;
      gap: 6px;
      margin-top: 12px;
    }
    .loader-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--football);
      animation: bounce 1.2s infinite ease-in-out;
    }
    .loader-dot:nth-child(2) { animation-delay: 0.2s; background: var(--strength); }
    .loader-dot:nth-child(3) { animation-delay: 0.4s; background: var(--chinese); }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--text-muted);
    }
    .empty-state-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state-text { font-size: 15px; }

    /* ── Section heading in history ── */
    .history-section-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      text-transform: uppercase;
      padding: 16px 16px 8px;
    }

    /* ── Header element classes ── */
    .header-top {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      padding: 12px 16px 0;
    }
    .header-wordmark {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      font-weight: 500;
      flex-shrink: 0;
    }
    .office-days-link {
      font-size: 11px;
      color: var(--text-dim);
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
      margin-left: auto;
      padding: 0;
    }
    .office-days-link:hover { color: var(--text-muted); }
    .week-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      margin: 10px 0 0;
    }
    .week-nav-btn {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 14px;
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
      transition: background 0.15s ease;
    }
    .week-nav-btn:hover { background: var(--surface-3); }
    .week-nav-btn:focus-visible { outline: 2px solid var(--football); outline-offset: 2px; }
    .week-nav-label {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }
    /* Desktop inline tab switcher — hidden on mobile */
    .header-tabs-desktop { display: none; }
    .header-tab {
      padding: 6px 14px;
      border-radius: 7px;
      border: none;
      background: transparent;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
    }
    .header-tab.active { background: var(--surface-3); color: var(--text); }
    .header-tab:focus-visible { outline: 2px solid var(--football); outline-offset: 2px; }
    .header-progress {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px 12px;
    }
    .progress-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* ── Rest day ── */
    .rest-day {
      margin: 0 12px 8px;
      padding: 10px 14px;
      border: 1px dashed var(--border);
      border-radius: 12px;
      font-size: 13px;
      color: var(--text-dim);
    }

    /* ── Week sidebar (desktop only) ── */
    #week-layout { display: block; }
    #week-sidebar { display: none; }

    .sidebar-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .sidebar-section-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .sidebar-type-row { margin-bottom: 12px; }
    .sidebar-type-row:last-child { margin-bottom: 0; }
    .sidebar-type-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
    }
    .sidebar-type-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .sidebar-type-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      flex: 1;
    }
    .sidebar-type-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
    }
    .sidebar-type-bar {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .sidebar-type-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.4s ease;
    }
    .sidebar-office-days { display: flex; gap: 6px; }
    .sidebar-office-pip {
      flex: 1;
      padding: 8px 4px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      font-family: 'Space Grotesk', sans-serif;
      text-align: center;
    }
    .sidebar-office-pip.office {
      border-color: color-mix(in oklch, var(--football) 30%, transparent);
      background: color-mix(in oklch, var(--football) 6%, transparent);
      color: var(--text-muted);
    }

    /* ── Desktop (≥ 768px) ── */
    @media (min-width: 768px) {
      body {
        max-width: none;
      }

      #app-header {
        max-width: 1080px;
      }

      #tab-bar { display: none; }

      #main-content {
        padding-top: 90px;
        padding-bottom: 40px;
        max-width: 1080px;
        margin: 0 auto;
        width: 100%;
      }

      /* Header: collapse to a single row */
      .header-top {
        flex-wrap: nowrap;
        align-items: center;
        gap: 16px;
        padding: 14px 24px 12px;
      }
      .week-nav {
        width: auto;
        flex: 1;
        justify-content: center;
        gap: 16px;
        margin: 0;
      }
      .week-nav-label { font-size: 15px; }
      .header-tabs-desktop {
        display: flex;
        gap: 2px;
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 3px;
        flex-shrink: 0;
      }
      .office-days-link { margin-left: 0; }
      .header-progress { padding: 0 24px 14px; }

      /* Sessions list + sidebar */
      #week-layout {
        display: grid;
        grid-template-columns: 1fr 260px;
        gap: 0 24px;
        padding: 24px 24px 0;
        align-items: start;
      }
      #week-sidebar {
        display: block;
        position: sticky;
        top: 90px;
      }
      .day-group { margin-bottom: 20px; }
      .day-header { padding: 0 0 0 4px; }
      .card { margin: 0 0 8px; }
      .rest-day { margin: 0 0 8px; }

      /* History: 4-column stats, 2-column week list */
      .stats-grid {
        grid-template-columns: repeat(4, 1fr);
        padding: 24px;
      }
      .history-section-label { padding: 20px 24px 10px; }
      .week-list {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        padding: 0 24px 24px;
      }
      .week-row { margin: 0; }

      /* Modal: centered dialog instead of bottom sheet */

      .modal-overlay { align-items: center; }
      .modal-sheet {
        border-radius: 20px;
        max-width: 460px;
        border: 1px solid var(--border);
      }
      .modal-handle { display: none; }
    }

    /* ── Reduced motion ── */
    @media (prefers-reduced-motion: reduce) {
      .card, .card-chevron, .card-expand-wrap,
      .card-status-btn, .status-pill, .felt-btn,
      .modal-btn, .modal-btn-secondary, .week-nav-btn, .day-toggle,
      .tab-btn, .header-tab, .progress-fill { transition: none; }
      .loader-dot { animation: none; opacity: 1; transform: none; }
    }
  </style>
</head>
<body>

<!-- Loading screen -->
<div id="loading-screen" role="status" aria-label="Loading Habitual">
  <div class="loader-dot-row">
    <div class="loader-dot"></div>
    <div class="loader-dot"></div>
    <div class="loader-dot"></div>
  </div>
  <div class="loader-wordmark">HABITUAL</div>
</div>

<!-- Office day setup modal -->
<div id="office-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="office-modal-title">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="office-modal-title">Set up this week</div>
    <div class="modal-subtitle" id="office-modal-subtitle">Which days are you in the office?</div>

    <!-- Step 1: day picker -->
    <div id="modal-step-picker">
      <div class="day-toggles">
        <button class="day-toggle" data-day="monday">Mon</button>
        <button class="day-toggle" data-day="tuesday">Tue</button>
        <button class="day-toggle" data-day="wednesday">Wed</button>
        <button class="day-toggle" data-day="thursday">Thu</button>
        <button class="day-toggle" data-day="friday">Fri</button>
      </div>
      <div class="modal-note">
        Pimsleur commute sessions appear on office days (Wed, Thu, Fri). Exercise sessions shift to evenings when you're in the office.
      </div>
      <button class="modal-btn" id="modal-submit-btn">Start week</button>
    </div>

    <!-- Step 2: diff preview (shown when editing an already-seeded week) -->
    <div id="modal-step-diff" style="display:none;">
      <div id="modal-diff-list" class="diff-list"></div>
      <div class="modal-btn-row">
        <button class="modal-btn-secondary" id="modal-back-btn">← Back</button>
        <button class="modal-btn" id="modal-confirm-btn" style="flex:1;">Confirm changes</button>
      </div>
    </div>
  </div>
</div>

<!-- Main app -->
<div id="app" style="display:none;">

  <!-- Sticky header -->
  <div id="app-header">
    <div class="header-top">
      <span class="header-wordmark">HABITUAL</span>
      <!-- Desktop inline tab switcher (hidden on mobile, shown via media query) -->
      <div class="header-tabs-desktop">
        <button class="header-tab active" id="htab-week" onclick="switchTab('week')">This Week</button>
        <button class="header-tab" id="htab-history" onclick="switchTab('history')">All Time</button>
      </div>
      <!-- Week navigation (full-width row on mobile, flex item on desktop) -->
      <div class="week-nav">
        <button class="week-nav-btn" onclick="navigateWeek(-1)" aria-label="Previous week">‹</button>
        <div id="week-label" class="week-nav-label"></div>
        <button class="week-nav-btn" onclick="navigateWeek(1)" aria-label="Next week">›</button>
      </div>
      <button id="edit-office-btn" class="office-days-link" onclick="openOfficeDayModal(true)">office days</button>
    </div>
    <div class="header-progress">
      <div class="progress-track" style="flex:1;">
        <div id="progress-fill" class="progress-fill" style="width:0%;"></div>
      </div>
      <span id="progress-label" class="progress-label">0 / 0</span>
    </div>
  </div>

  <!-- Main scrollable area -->
  <div id="main-content">
    <!-- Week layout: session list + sidebar -->
    <div id="week-layout">
      <div id="week-view"></div>
      <aside id="week-sidebar"></aside>
    </div>
    <!-- History view -->
    <div id="history-view" style="display:none;"></div>
  </div>

  <!-- Bottom tab bar -->
  <div id="tab-bar">
    <div style="display:flex;">
      <button class="tab-btn active" id="tab-week" onclick="switchTab('week')">
        <span class="tab-icon">📅</span>
        <span>This Week</span>
      </button>
      <button class="tab-btn" id="tab-history" onclick="switchTab('history')">
        <span class="tab-icon">📊</span>
        <span>All Time</span>
      </button>
    </div>
  </div>

</div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
const state = {
  currentWeek: null,   // 'YYYY-MM-DD'
  sessions: [],
  officeDays: [],
  view: 'week',
  expandedId: null,
  setupWeek: null,     // week being set up in modal
  isEditingOfficeDays: false,
  weeks: [],
  stats: null,
};

// ─── Utils ───────────────────────────────────────────────────────────────────
function getMondayOfWeek(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  d.setHours(0, 0, 0, 0);
  return d;
}

function formatISO(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function currentMondayISO() {
  return formatISO(getMondayOfWeek(new Date()));
}

function addWeeks(isoDate, n) {
  const d = new Date(isoDate + 'T00:00:00');
  d.setDate(d.getDate() + n * 7);
  return formatISO(d);
}

function formatWeekLabel(mondayISO) {
  const mon = new Date(mondayISO + 'T00:00:00');
  const sun = new Date(mon);
  sun.setDate(mon.getDate() + 6);
  const opts = { day: 'numeric', month: 'short' };
  const monStr = mon.toLocaleDateString('en-GB', opts);
  const sunStr = sun.toLocaleDateString('en-GB', opts);
  return `${monStr} – ${sunStr}`;
}

function todayDayName() {
  const days = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
  return days[new Date().getDay()];
}

function dayDisplayName(day) {
  return { monday:'Monday', tuesday:'Tuesday', wednesday:'Wednesday',
    thursday:'Thursday', friday:'Friday', saturday:'Saturday', sunday:'Sunday' }[day] || day;
}

function dayShortName(day) {
  return { monday:'Mon', tuesday:'Tue', wednesday:'Wed',
    thursday:'Thu', friday:'Fri', saturday:'Sat', sunday:'Sun' }[day] || day;
}

function dateForDay(mondayISO, day) {
  const offsets = { monday:0, tuesday:1, wednesday:2, thursday:3, friday:4, saturday:5, sunday:6 };
  const d = new Date(mondayISO + 'T00:00:00');
  d.setDate(d.getDate() + (offsets[day] ?? 0));
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}

function statusIcon(status) {
  const s = (c, p) => `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${p}" stroke-linecap="round" stroke-linejoin="round" style="color:var(--${c})">`;;
  if (status === 'done')      return s('done', '3')      + '<polyline points="20 6 9 17 4 12"/></svg>';
  if (status === 'injured')   return s('injured', '2.5') + '<line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';
  if (status === 'cancelled') return s('cancelled', '2.5') + '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
  if (status === 'skipped')   return s('skipped', '2.5')   + '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
  return '';
}

function debounce(fn, ms) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

// ─── API ─────────────────────────────────────────────────────────────────────
const api = {
  async seedAuto() {
    const r = await fetch('/api/seed-auto', { method: 'POST' });
    return r.json();
  },
  async getSessions(week) {
    const r = await fetch(`/api/sessions?week=${week}`);
    return r.json();
  },
  async seed(week) {
    const r = await fetch(`/api/seed?week=${week}`, { method: 'POST' });
    return r.json();
  },
  async setOfficeDays(week_start, days) {
    const r = await fetch('/api/office-days', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ week_start, days }),
    });
    return r.json();
  },
  async getOfficeDays(week) {
    const r = await fetch(`/api/office-days?week=${week}`);
    return r.json();
  },
  async patchSession(id, data) {
    const r = await fetch(`/api/sessions/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
    return r.json();
  },
  async getWeeks() {
    const r = await fetch('/api/weeks');
    return r.json();
  },
  async getStats() {
    const r = await fetch('/api/stats');
    return r.json();
  },
  async reschedulePreview(week_start, days) {
    const r = await fetch('/api/reschedule-preview', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ week_start, days }),
    });
    return r.json();
  },
  async rescheduleApply(week_start, days) {
    const r = await fetch('/api/reschedule-apply', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ week_start, days }),
    });
    return r.json();
  },
};

// ─── Init ────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const result = await api.seedAuto();

    if (result.needs_setup) {
      state.setupWeek = result.week_start;
      state.currentWeek = result.week_start;
      showLoading(false);
      showApp(true);
      updateWeekLabel();
      openOfficeDayModal(false);
    } else {
      state.currentWeek = result.week_start;
      await loadWeek(state.currentWeek);
      showLoading(false);
      showApp(true);
    }
  } catch (e) {
    showLoading(false);
    showApp(true);
    document.getElementById('week-view').innerHTML =
      '<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-text">Could not connect to server.<br/>Check your connection and reload.</div></div>';
  }
}

async function loadWeek(weekISO) {
  state.currentWeek = weekISO;
  state.expandedId = null;
  updateWeekLabel();

  const data = await api.getSessions(weekISO);

  if (!data.week_exists) {
    state.sessions = [];
    state.officeDays = [];
    renderWeek();
    updateProgress();
    // Future or current week not yet set up — prompt immediately
    if (weekISO >= currentMondayISO()) {
      state.setupWeek = weekISO;
      openOfficeDayModal(false);
    }
    return;
  }

  state.sessions = data.sessions;

  const odData = await api.getOfficeDays(weekISO);
  state.officeDays = odData.office_days || [];

  renderWeek();
  updateProgress();
}

// ─── Navigation ──────────────────────────────────────────────────────────────
function navigateWeek(direction) {
  const newWeek = addWeeks(state.currentWeek, direction);
  loadWeek(newWeek);
}

function updateWeekLabel() {
  document.getElementById('week-label').textContent = formatWeekLabel(state.currentWeek);
}

// ─── Tabs ────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  state.view = tab;
  document.getElementById('week-layout').style.display  = tab === 'week' ? '' : 'none';
  document.getElementById('history-view').style.display = tab === 'history' ? '' : 'none';
  // Bottom tab bar (mobile)
  document.getElementById('tab-week').classList.toggle('active', tab === 'week');
  document.getElementById('tab-history').classList.toggle('active', tab === 'history');
  // Desktop header tabs
  document.getElementById('htab-week').classList.toggle('active', tab === 'week');
  document.getElementById('htab-history').classList.toggle('active', tab === 'history');
  document.getElementById('edit-office-btn').style.display = tab === 'week' ? '' : 'none';

  if (tab === 'history') loadHistory();
}

// ─── Progress bar ────────────────────────────────────────────────────────────
function updateProgress() {
  const total = state.sessions.length;
  const done  = state.sessions.filter(s => s.status === 'done').length;
  const pct   = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('progress-fill').style.width = `${pct}%`;
  document.getElementById('progress-label').textContent = `${done} / ${total}`;
}

// ─── Week render ─────────────────────────────────────────────────────────────
function renderWeek() {
  const container = document.getElementById('week-view');
  const today = todayDayName();
  const isCurrentWeek = state.currentWeek === currentMondayISO();
  const dayOrder = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];

  const grouped = {};
  for (const s of state.sessions) {
    if (!grouped[s.day]) grouped[s.day] = [];
    grouped[s.day].push(s);
  }

  let html = '';
  for (const day of dayOrder) {
    const sessions = grouped[day] || [];
    const isToday = isCurrentWeek && day === today;
    const dateStr = dateForDay(state.currentWeek, day);

    html += `<div class="day-group">
      <div class="day-header">
        <span class="day-label${isToday ? ' today' : ''}">${dayDisplayName(day)}</span>
        ${isToday ? '<span class="today-badge">TODAY</span>' : ''}
        <span class="day-date">${dateStr}</span>
      </div>`;

    if (sessions.length === 0) {
      html += `<div class="rest-day">Rest day</div>`;
    } else {
      for (const s of sessions) {
        html += renderCard(s);
      }
    }
    html += '</div>';
  }

  container.innerHTML = html;
  renderWeekSidebar();
}

function renderCard(s) {
  const expanded = state.expandedId === s.id;
  const isChinese = s.type === 'chinese';

  const statusBtnClass = ['done','injured','cancelled','skipped'].includes(s.status) ? s.status : '';

  return `
  <div class="card${expanded ? ' expanded' : ''} status-${s.status}" data-type="${s.type}" data-id="${s.id}">
    <div class="card-header">
      <div class="card-type-dot"></div>
      <div class="card-info">
        <div class="card-name">${s.name}</div>
        <input class="card-time-input" type="text" data-action="time-input" data-id="${s.id}"
          value="${s.time_slot || ''}" placeholder="Add time" aria-label="Edit time slot">
      </div>
      <button class="card-status-btn ${statusBtnClass}" data-action="quick-done" data-id="${s.id}" aria-label="${s.status === 'done' ? 'Mark as pending' : 'Mark as done'}">
        ${statusIcon(s.status)}
      </button>
      <span class="card-chevron">▾</span>
    </div>
    <div class="card-expand-wrap">
      <div class="card-expand-inner">
        <div class="card-expand-body">
          ${renderExpandBody(s, isChinese)}
        </div>
      </div>
    </div>
  </div>`;
}

function renderExpandBody(s, isChinese) {
  let html = '';

  // Status pills
  if (isChinese) {
    html += `<div class="status-row">
      <button class="status-pill${s.status === 'done' ? ' active-done' : ''}" data-action="set-status" data-id="${s.id}" data-status="done">Done</button>
      <button class="status-pill${s.status === 'skipped' ? ' active-skipped' : ''}" data-action="set-status" data-id="${s.id}" data-status="skipped">Skipped</button>
      <button class="status-pill${s.status === 'pending' ? ' active-pending' : ''}" data-action="set-status" data-id="${s.id}" data-status="pending">Pending</button>
    </div>`;
  } else {
    html += `<div class="status-row">
      <button class="status-pill${s.status === 'done' ? ' active-done' : ''}" data-action="set-status" data-id="${s.id}" data-status="done">Done</button>
      <button class="status-pill${s.status === 'injured' ? ' active-injured' : ''}" data-action="set-status" data-id="${s.id}" data-status="injured">Injured</button>
      <button class="status-pill${s.status === 'cancelled' ? ' active-cancelled' : ''}" data-action="set-status" data-id="${s.id}" data-status="cancelled">Cancelled</button>
      <button class="status-pill${s.status === 'pending' ? ' active-pending' : ''}" data-action="set-status" data-id="${s.id}" data-status="pending">Pending</button>
    </div>`;

    // Felt (physical only)
    const felts = ['great','good','okay','tough'];
    html += `<div class="felt-section">
      <div class="felt-label">How did it feel?</div>
      <div class="felt-row">
        ${felts.map(f => `<button class="felt-btn${s.felt === f ? ' active' : ''}" data-action="set-felt" data-id="${s.id}" data-felt="${f}">${f.charAt(0).toUpperCase() + f.slice(1)}</button>`).join('')}
      </div>
    </div>`;
  }

  // Notes (all sessions)
  html += `<div class="notes-section">
    <textarea class="notes-textarea" data-action="notes" data-id="${s.id}" placeholder="Add a note…" rows="2">${s.notes || ''}</textarea>
  </div>`;

  return html;
}

// ─── Week sidebar ─────────────────────────────────────────────────────────────
function renderWeekSidebar() {
  const el = document.getElementById('week-sidebar');
  if (!el) return;

  const sessions = state.sessions;
  const TYPE_META = [
    { key: 'football', label: 'Football', color: 'var(--football)' },
    { key: 'strength', label: 'Strength', color: 'var(--strength)' },
    { key: 'speed',    label: 'Speed',    color: 'var(--speed)'    },
    { key: 'cardio',   label: 'Cardio',   color: 'var(--cardio)'   },
    { key: 'chinese',  label: 'Chinese',  color: 'var(--chinese)'  },
  ];

  let typeHtml = '';
  for (const { key, label, color } of TYPE_META) {
    const all  = sessions.filter(s => s.type === key);
    if (all.length === 0) continue;
    const done = all.filter(s => s.status === 'done').length;
    const pct  = Math.round((done / all.length) * 100);
    typeHtml += `
      <div class="sidebar-type-row">
        <div class="sidebar-type-header">
          <span class="sidebar-type-dot" style="background:${color};"></span>
          <span class="sidebar-type-name">${label}</span>
          <span class="sidebar-type-count">${done}/${all.length}</span>
        </div>
        <div class="sidebar-type-bar">
          <div class="sidebar-type-fill" style="width:${pct}%;background:${color};"></div>
        </div>
      </div>`;
  }

  const WEEKDAYS = ['monday','tuesday','wednesday','thursday','friday'];
  const SHORT = { monday:'Mon', tuesday:'Tue', wednesday:'Wed', thursday:'Thu', friday:'Fri' };
  const officeDays = state.officeDays || [];
  const officePips = WEEKDAYS.map(d =>
    `<span class="sidebar-office-pip${officeDays.includes(d) ? ' office' : ''}">${SHORT[d]}</span>`
  ).join('');

  const noSessions = sessions.length === 0;

  el.innerHTML = `
    <div class="sidebar-card">
      <div class="sidebar-section-label">By type</div>
      ${noSessions
        ? `<div style="font-size:13px;color:var(--text-dim);">Week not tracked</div>`
        : typeHtml}
    </div>
    <div class="sidebar-card">
      <div class="sidebar-section-label">Office days</div>
      <div class="sidebar-office-days">${officePips}</div>
    </div>`;
}

function attachCardListeners() {
  const container = document.getElementById('week-view');
  container.addEventListener('click', handleCardClick);
  container.addEventListener('input', handleNotesInput);
  container.addEventListener('focusout', handleTimeInputFocusout);
}

function handleCardClick(e) {
  const actionEl = e.target.closest('[data-action]');
  if (actionEl) {
    e.stopPropagation();
    const action = actionEl.dataset.action;
    const id = parseInt(actionEl.dataset.id, 10);

    if (action === 'quick-done') {
      const session = state.sessions.find(s => s.id === id);
      if (!session) return;
      const newStatus = session.status === 'done' ? 'pending' : 'done';
      updateSessionStatus(id, newStatus);
      return;
    }
    if (action === 'set-status') {
      updateSessionStatus(id, actionEl.dataset.status);
      return;
    }
    if (action === 'set-felt') {
      updateSessionFelt(id, actionEl.dataset.felt);
      return;
    }
    return;
  }

  // Don't expand when interacting with inputs
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

  // Toggle card expand
  const card = e.target.closest('.card');
  if (!card) return;
  const id = parseInt(card.dataset.id, 10);
  state.expandedId = state.expandedId === id ? null : id;
  renderWeek();
}

const saveNotes = debounce(async (id, notes) => {
  const session = state.sessions.find(s => s.id === id);
  if (!session) return;
  session.notes = notes;
  await api.patchSession(id, { notes });
}, 900);

function handleNotesInput(e) {
  if (e.target.dataset.action !== 'notes') return;
  const id = parseInt(e.target.dataset.id, 10);
  saveNotes(id, e.target.value);
}

async function updateSessionStatus(id, status) {
  const session = state.sessions.find(s => s.id === id);
  if (!session) return;
  session.status = status;
  renderWeek();
  updateProgress();
  await api.patchSession(id, { status });
}

function handleTimeInputFocusout(e) {
  if (e.target.dataset.action !== 'time-input') return;
  const id = parseInt(e.target.dataset.id, 10);
  const newTime = e.target.value.trim();
  const session = state.sessions.find(s => s.id === id);
  if (!session || session.time_slot === newTime) return;
  session.time_slot = newTime;
  api.patchSession(id, { time_slot: newTime });
}

async function updateSessionFelt(id, felt) {
  const session = state.sessions.find(s => s.id === id);
  if (!session) return;
  // Toggle off if already selected
  session.felt = session.felt === felt ? null : felt;
  renderWeek();
  await api.patchSession(id, { felt: session.felt });
}

// ─── History view ─────────────────────────────────────────────────────────────
async function loadHistory() {
  const historyEl = document.getElementById('history-view');
  historyEl.innerHTML = '<div class="empty-state"><div class="loader-dot-row" style="justify-content:center;"><div class="loader-dot"></div><div class="loader-dot"></div><div class="loader-dot"></div></div></div>';

  const [weeksData, statsData] = await Promise.all([api.getWeeks(), api.getStats()]);
  state.weeks = weeksData.weeks || [];
  state.stats = statsData;

  renderHistory();
}

function renderHistory() {
  const el = document.getElementById('history-view');
  const s = state.stats;

  let html = '<div class="history-section-label">All Time</div>';
  html += `<div class="stats-grid">
    <div class="stat-card">
      <div class="stat-value">${s?.completion_rate ?? 0}%</div>
      <div class="stat-label">Completion rate</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">${s?.weeks_tracked ?? 0}</div>
      <div class="stat-label">Weeks tracked</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">${s?.completed ?? 0}</div>
      <div class="stat-label">Sessions done</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" style="color:var(--injured);">${s?.injured ?? 0}</div>
      <div class="stat-label">Injured${s?.most_injured_type ? `<br><span style="font-size:11px;opacity:0.7;">${s.most_injured_type}</span>` : ''}</div>
    </div>
  </div>`;

  if (state.weeks.length > 0) {
    html += '<div class="history-section-label">Past Weeks</div>';
    html += '<div class="week-list">';
    for (const w of state.weeks) {
      const total = parseInt(w.total, 10) || 0;
      const done  = parseInt(w.done, 10) || 0;
      const injured = parseInt(w.injured, 10) || 0;
      const cancelled = parseInt(w.cancelled, 10) || 0;
      const skipped = parseInt(w.skipped, 10) || 0;
      const pct = total > 0 ? Math.round((done / total) * 100) : 0;

      const mon = new Date(w.week_start + 'T00:00:00');
      const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
      const label = `${mon.toLocaleDateString('en-GB', { day:'numeric', month:'short' })} – ${sun.toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' })}`;

      html += `<div class="week-row">
        <div class="week-row-header">
          <span class="week-dates">${label}</span>
          <span class="week-pct">${pct}%</span>
        </div>
        <div class="week-mini-bar"><div class="week-mini-fill" style="width:${pct}%;"></div></div>
        <div class="week-pills">
          <span class="week-pill done-pill">${done} done</span>
          ${injured > 0 ? `<span class="week-pill injured-pill">${injured} injured</span>` : ''}
          ${cancelled > 0 ? `<span class="week-pill cancelled-pill">${cancelled} cancelled</span>` : ''}
          ${skipped > 0 ? `<span class="week-pill skipped-pill">${skipped} skipped</span>` : ''}
        </div>
      </div>`;
    }
    html += '</div>'; // .week-list
  } else {
    html += '<div class="empty-state" style="padding:24px;"><div class="empty-state-text" style="color:var(--text-dim);">No history yet</div></div>';
  }

  el.innerHTML = html;
}

// ─── Office day modal ────────────────────────────────────────────────────────
function openOfficeDayModal(isEdit) {
  state.isEditingOfficeDays = isEdit;
  showModalStep(1);

  const toggles = document.querySelectorAll('#office-modal .day-toggle');
  if (isEdit) {
    toggles.forEach(btn => btn.classList.toggle('selected', state.officeDays.includes(btn.dataset.day)));
    document.getElementById('office-modal-title').textContent = 'Edit office days';
    document.getElementById('office-modal-subtitle').textContent = 'Which days are you in the office this week?';
    document.getElementById('modal-submit-btn').textContent = 'Preview changes';
  } else {
    toggles.forEach(btn => btn.classList.remove('selected'));
    document.getElementById('office-modal-title').textContent = 'Set up this week';
    document.getElementById('office-modal-subtitle').textContent = 'Which days are you in the office?';
    document.getElementById('modal-submit-btn').textContent = 'Start week';
  }

  document.getElementById('office-modal').classList.remove('hidden');
}

function closeOfficeDayModal() {
  document.getElementById('office-modal').classList.add('hidden');
}

function showModalStep(step) {
  document.getElementById('modal-step-picker').style.display = step === 1 ? '' : 'none';
  document.getElementById('modal-step-diff').style.display   = step === 2 ? '' : 'none';
}

function renderDiffList(changes) {
  const DAY_SHORT = { monday:'Mon', tuesday:'Tue', wednesday:'Wed', thursday:'Thu', friday:'Fri', saturday:'Sat', sunday:'Sun' };
  return changes.map(c => {
    const badge = c.type === 'add' ? 'add' : c.type === 'remove' ? 'remove' : 'update';
    const label = c.type === 'add' ? 'Add' : c.type === 'remove' ? 'Remove' : 'Shift';
    const dayStr = DAY_SHORT[c.day] || c.day;
    let slotsHtml = '';
    if (c.type === 'update') {
      slotsHtml = `<span class="diff-old">${c.old_slot}</span><span class="diff-arrow">→</span><span class="diff-new">${c.new_slot}</span>`;
    } else if (c.type === 'add') {
      slotsHtml = `<span class="diff-slot-only">${c.new_slot}</span>`;
    } else {
      slotsHtml = `<span class="diff-slot-only">${c.old_slot}</span>`;
    }
    return `<div class="diff-item">
      <span class="diff-badge diff-badge-${badge}">${label}</span>
      <div class="diff-detail">
        <div class="diff-name">${c.name}</div>
        <div class="diff-day">${dayStr}</div>
        <div class="diff-slots">${slotsHtml}</div>
      </div>
    </div>`;
  }).join('');
}

// Day toggle clicks
document.querySelectorAll('.day-toggle').forEach(btn => {
  btn.addEventListener('click', () => btn.classList.toggle('selected'));
});

// Step 1: Start week (new) or Preview changes (edit)
document.getElementById('modal-submit-btn').addEventListener('click', async () => {
  const selectedDays = [...document.querySelectorAll('#modal-step-picker .day-toggle.selected')].map(b => b.dataset.day);
  const weekISO = state.currentWeek || state.setupWeek;
  const btn = document.getElementById('modal-submit-btn');

  if (!state.isEditingOfficeDays) {
    // New week — seed immediately
    btn.disabled = true;
    btn.textContent = 'Setting up…';
    try {
      await api.setOfficeDays(weekISO, selectedDays);
      await api.seed(weekISO);
      state.officeDays = selectedDays;
      closeOfficeDayModal();
      await loadWeek(weekISO);
    } catch (e) {
      btn.textContent = 'Error — try again';
    } finally {
      btn.disabled = false;
    }
    return;
  }

  // Editing — fetch preview first
  btn.disabled = true;
  btn.textContent = 'Checking…';
  try {
    const { changes } = await api.reschedulePreview(weekISO, selectedDays);
    if (!changes || changes.length === 0) {
      // No schedule changes — just update office days record and close
      await api.setOfficeDays(weekISO, selectedDays);
      state.officeDays = selectedDays;
      closeOfficeDayModal();
      renderWeekSidebar();
    } else {
      // Show diff
      document.getElementById('modal-diff-list').innerHTML = renderDiffList(changes);
      document.getElementById('office-modal-subtitle').textContent =
        `${changes.length} session${changes.length === 1 ? '' : 's'} would change.`;
      showModalStep(2);
      // Store selected days for confirm step
      document.getElementById('modal-confirm-btn').dataset.days = JSON.stringify(selectedDays);
    }
  } catch (e) {
    btn.textContent = 'Error — try again';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Preview changes';
  }
});

// Step 2: Back
document.getElementById('modal-back-btn').addEventListener('click', () => {
  document.getElementById('office-modal-subtitle').textContent = 'Which days are you in the office this week?';
  showModalStep(1);
});

// Step 2: Confirm
document.getElementById('modal-confirm-btn').addEventListener('click', async () => {
  const weekISO = state.currentWeek || state.setupWeek;
  const days = JSON.parse(document.getElementById('modal-confirm-btn').dataset.days || '[]');
  const btn = document.getElementById('modal-confirm-btn');
  btn.disabled = true;
  btn.textContent = 'Applying…';
  try {
    const result = await api.rescheduleApply(weekISO, days);
    state.officeDays = days;
    state.sessions = result.sessions || [];
    closeOfficeDayModal();
    renderWeek();
    updateProgress();
  } catch (e) {
    btn.textContent = 'Error — try again';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Confirm changes';
  }
});

// ─── UI helpers ──────────────────────────────────────────────────────────────
function showLoading(show) {
  document.getElementById('loading-screen').classList.toggle('hidden', !show);
}

function showApp(show) {
  const app = document.getElementById('app');
  app.style.display = show ? 'flex' : 'none';
  app.style.flexDirection = 'column';
  app.style.height = '100%';
}

// ─── Boot ────────────────────────────────────────────────────────────────────
attachCardListeners();
showLoading(true);
init();
</script>
</body>
</html>
