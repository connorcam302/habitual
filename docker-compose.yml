services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: habitual
      POSTGRES_PASSWORD: habitual
      POSTGRES_DB: habitual
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U habitual"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./api
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://habitual:habitual@db:5432/habitual
      PORT: 8001
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
